<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理系统-PDF转换器</title>
    <link rel="icon" type="image/svg+xml" href="/PG/source/pg.svg">
    <link rel="apple-touch-icon" href="/PG/source/pg.svg">
    <script src="/PG/source/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 10px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #2c3e50;
            font-size: 28px;
            font-weight: 600;
        }
        
        .header .subtitle {
            color: #7f8c8d;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .refresh-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        .download-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .download-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }
        
        .stat-card.users {
            border-left: 4px solid #3498db;
        }
        
        .stat-card.users .user-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stat-card.users .user-stat-item {
            flex: 1;
            text-align: center;
        }
        
        .stat-card.users .user-stat-item:first-child {
            border-right: 1px solid #ecf0f1;
        }
        
        .stat-card.users .user-stat-label {
            color: #7f8c8d;
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .stat-card.users .user-stat-value {
            color: #2c3e50;
            font-size: 24px;
            font-weight: 700;
        }
        
        .stat-card.active-users {
            border-left: 4px solid #2ecc71;
        }
        
        .stat-card.files {
            border-left: 4px solid #9b59b6;
        }
        
        .stat-card.processing {
            border-left: 4px solid #f39c12;
        }
        
        .stat-card .icon {
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .stat-card .label {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .stat-card .value {
            color: #2c3e50;
            font-size: 32px;
            font-weight: 700;
        }
        
        .stat-card.clickable {
            cursor: pointer;
        }
        
        .stat-card.clickable:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }
        
        .charts-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .chart-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .chart-card h2 {
            color: #2c3e50;
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .period-selector {
            display: flex;
            gap: 10px;
        }
        
        .period-btn {
            background: #ecf0f1;
            color: #2c3e50;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        
        .period-btn:hover {
            background: #bdc3c7;
        }
        
        .period-btn.active {
            background: #3498db;
            color: white;
        }
        
        .chart-container {
            position: relative;
            height: 350px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }
        
        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        
        .footer {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        @media (max-width: 768px) {
            .charts-section {
                grid-template-columns: 1fr;
            }
            
            .header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            
            .stat-card .value {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>📊 后台管理系统</h1>
                <div class="subtitle">PDF转换器数据统计与分析</div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="download-btn" onclick="downloadStats()">📥 下载统计</button>
                <button class="refresh-btn" onclick="refreshData()">🔄 刷新数据</button>
            </div>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        
        <div class="stats-grid">
            <div class="stat-card users">
                <div class="icon">👥</div>
                <div class="user-stats">
                    <div class="user-stat-item">
                        <div class="user-stat-label">总访问用户数</div>
                        <div class="user-stat-value" id="totalUsers">0</div>
                    </div>
                    <div class="user-stat-item">
                        <div class="user-stat-label">用户总访问量</div>
                        <div class="user-stat-value" id="totalVisits">0</div>
                    </div>
                </div>
            </div>
            
            <div class="stat-card active-users">
                <div class="icon">🟢</div>
                <div class="label">当前活跃用户数</div>
                <div class="value" id="activeUsers">0</div>
            </div>
            
            <div class="stat-card files clickable" onclick="window.location.href='/PG/files'">
                <div class="icon">📄</div>
                <div class="label">已处理文件数</div>
                <div class="value" id="totalFiles">0</div>
            </div>
            
            <div class="stat-card processing">
                <div class="icon">⚙️</div>
                <div class="label">正在处理文件数</div>
                <div class="value" id="processingFiles">0</div>
            </div>
        </div>
        
        <div class="charts-section">
            <div class="chart-card">
                <h2>
                    <span>📈 用户访问量趋势</span>
                    <div class="period-selector">
                        <button class="period-btn active" onclick="changePeriod('visits', 'week', this)">一周</button>
                        <button class="period-btn" onclick="changePeriod('visits', 'month', this)">一月</button>
                        <button class="period-btn" onclick="changePeriod('visits', 'quarter', this)">三月</button>
                        <button class="period-btn" onclick="changePeriod('visits', 'half_year', this)">半年</button>
                    </div>
                </h2>
                <div class="chart-container">
                    <canvas id="visitsChart"></canvas>
                </div>
            </div>
            
            <div class="chart-card">
                <h2>
                    <span>📊 文件处理量趋势</span>
                    <div class="period-selector">
                        <button class="period-btn active" onclick="changePeriod('files', 'week', this)">一周</button>
                        <button class="period-btn" onclick="changePeriod('files', 'month', this)">一月</button>
                        <button class="period-btn" onclick="changePeriod('files', 'quarter', this)">三月</button>
                        <button class="period-btn" onclick="changePeriod('files', 'half_year', this)">半年</button>
                    </div>
                </h2>
                <div class="chart-container">
                    <canvas id="filesChart"></canvas>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 PDF转换器后台管理系统 | 数据实时更新</p>
        </div>
    </div>

    <script>
        let visitsChart = null;
        let filesChart = null;
        let currentVisitsPeriod = 'week';
        let currentFilesPeriod = 'week';
        
        // 根式化日期显示，根据时间范围选择合适格式
        function formatDate(dateStr, period = 'week') {
            // 尝试解析不同格式的日期
            let date;
            if (dateStr.includes('-')) {
                // 如果是 YYYY-MM-DD 或 YYYY-MM 格式
                if (dateStr.split('-').length === 3) {
                    // YYYY-MM-DD 格式
                    date = new Date(dateStr);
                } else if (dateStr.split('-').length === 2) {
                    // YYYY-MM 格式
                    date = new Date(dateStr + '-01'); // 添加默认的天数
                } else {
                    // 如果是其他格式，尝试直接解析
                    date = new Date(dateStr);
                }
            } else {
                // 如果不是标准格式，尝试其他方式解析
                date = new Date(dateStr);
            }
            
            // 如果日期有效，则格式化
            if (!isNaN(date.getTime())) {
                // 根据时间范围选择合适的格式
                if (period === 'half_year') {
                    // 半年视图：显示年月 (YYYY-MM)
                    return date.getFullYear() + '-' + 
                           String(date.getMonth() + 1).padStart(2, '0');
                } else {
                    // 其他视图（week/month/quarter）：显示年月日 (YYYY-MM-DD)
                    return date.getFullYear() + '-' + 
                           String(date.getMonth() + 1).padStart(2, '0') + '-' + 
                           String(date.getDate()).padStart(2, '0');
                }
            }
            
            // 如果无法解析，返回原始字符串
            return dateStr;
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadOverviewData();
            loadVisitsChart('week');
            loadFilesChart('week');
            
            // 每30秒自动刷新数据
            setInterval(refreshData, 30000);
        });
        
        // 加载概览数据
        async function loadOverviewData() {
            try {
                const response = await fetch('/PG/api/stats/overview');
                const data = await response.json();
                
                if (data.error) {
                    showError(data.error);
                    return;
                }
                
                document.getElementById('totalUsers').textContent = data.total_users.toLocaleString();
                document.getElementById('totalVisits').textContent = data.total_visits.toLocaleString();
                document.getElementById('activeUsers').textContent = data.active_users.toLocaleString();
                document.getElementById('totalFiles').textContent = data.total_files.toLocaleString();
                document.getElementById('processingFiles').textContent = data.processing_files.toLocaleString();
                
                hideError();
            } catch (error) {
                showError('加载概览数据失败: ' + error.message);
            }
        }
        
        // 加载访问量图表
        async function loadVisitsChart(period) {
            try {
                const response = await fetch(`/PG/api/stats/visits?period=${period}`);
                const data = await response.json();
                
                if (data.error) {
                    showError(data.error);
                    return;
                }
                
                const ctx = document.getElementById('visitsChart').getContext('2d');
                
                if (visitsChart) {
                    visitsChart.destroy();
                }
                
                // 格式化日期标签
                const formattedDates = data.dates.map(date => formatDate(date, period));
                
                visitsChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: formattedDates,
                        datasets: [{
                            label: '访问量',
                            data: data.counts,
                            borderColor: '#3498db',
                            backgroundColor: 'rgba(52, 152, 219, 0.1)',
                            fill: true,
                            tension: 0.4,
                            pointBackgroundColor: '#3498db',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            pointRadius: 5,
                            pointHoverRadius: 7
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: false
                            },
                            tooltip: {
                                backgroundColor: 'rgba(0, 0, 0, 0.8)',
                                padding: 12,
                                titleFont: {
                                    size: 14
                                },
                                bodyFont: {
                                    size: 13
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    stepSize: 1,
                                    font: {
                                        size: 12
                                    }
                                },
                                grid: {
                                    color: 'rgba(0, 0, 0, 0.05)'
                                }
                            },
                            x: {
                                ticks: {
                                    font: {
                                        size: 11
                                    },
                                    maxRotation: 45,
                                    minRotation: 45,
                                    autoSkip: true,
                                    autoSkipPadding: 30
                                },
                                grid: {
                                    display: false
                                }
                            }
                        }
                    }
                });
                
                hideError();
            } catch (error) {
                showError('加载访问量图表失败: ' + error.message);
            }
        }
        
        // 加载文件处理图表
        async function loadFilesChart(period) {
            try {
                const response = await fetch(`/PG/api/stats/files?period=${period}`);
                const data = await response.json();
                
                if (data.error) {
                    showError(data.error);
                    return;
                }
                
                const ctx = document.getElementById('filesChart').getContext('2d');
                
                if (filesChart) {
                    filesChart.destroy();
                }
                
                // 格式化日期标签
                const formattedDates = data.dates.map(date => formatDate(date, period));
                
                filesChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: formattedDates,
                        datasets: [{
                            label: '处理文件数',
                            data: data.counts,
                            borderColor: '#9b59b6',
                            backgroundColor: 'rgba(155, 89, 182, 0.1)',
                            fill: true,
                            tension: 0.4,
                            pointBackgroundColor: '#9b59b6',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            pointRadius: 5,
                            pointHoverRadius: 7
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: false
                            },
                            tooltip: {
                                backgroundColor: 'rgba(0, 0, 0, 0.8)',
                                padding: 12,
                                titleFont: {
                                    size: 14
                                },
                                bodyFont: {
                                    size: 13
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    stepSize: 1,
                                    font: {
                                        size: 12
                                    }
                                },
                                grid: {
                                    color: 'rgba(0, 0, 0, 0.05)'
                                }
                            },
                            x: {
                                ticks: {
                                    font: {
                                        size: 11
                                    },
                                    maxRotation: 45,
                                    minRotation: 45,
                                    autoSkip: true,
                                    autoSkipPadding: 30
                                },
                                grid: {
                                    display: false
                                }
                            }
                        }
                    }
                });
                
                hideError();
            } catch (error) {
                showError('加载文件处理图表失败: ' + error.message);
            }
        }
        
        // 切换时间周期
        function changePeriod(chartType, period, button) {
            // 更新按钮状态
            const buttons = button.parentElement.querySelectorAll('.period-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            
            // 加载对应数据
            if (chartType === 'visits') {
                currentVisitsPeriod = period;
                loadVisitsChart(period);
            } else if (chartType === 'files') {
                currentFilesPeriod = period;
                loadFilesChart(period);
            }
        }
        
        // 下载统计数据
        async function downloadStats() {
            try {
                const response = await fetch('/PG/api/stats/download');
                if (!response.ok) {
                    throw new Error('下载失败');
                }
                
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `统计数据_${new Date().toISOString().slice(0, 10)}.xlsx`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (error) {
                showError('下载统计数据失败: ' + error.message);
            }
        }
        
        // 刷新所有数据
        function refreshData() {
            loadOverviewData();
            loadVisitsChart(currentVisitsPeriod);
            loadFilesChart(currentFilesPeriod);
        }
        
        // 显示错误信息
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
        
        // 隐藏错误信息
        function hideError() {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'none';
        }
    </script>
</body>
</html>
